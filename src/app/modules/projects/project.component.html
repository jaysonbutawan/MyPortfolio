<!-- ============================================================
     PROJECTS SECTION — Interactive Card Grid
     Each card: gradient banner with icon → body with type, title,
     description, and tech stack tags.
     Scroll-triggered staggered reveal + hover elevation.
     ============================================================ -->

<section
  id="projects"
  class="relative py-20 md:py-28 px-6 md:px-8 max-w-[1200px] mx-auto"
>
  <!-- Section Header -->
  <div class="mb-14">
    <p
      class="font-['JetBrains_Mono',monospace] text-[0.72rem] text-[#5b8def] tracking-[3px] uppercase opacity-80 mb-3"
    >
      // Featured Projects
    </p>
    <h2
      class="text-[2.2rem] md:text-[2.6rem] font-bold tracking-[-1px] leading-[1.15] text-[#e8ecf4]"
    >
      Things I've
      <span
        class="text-transparent bg-clip-text bg-gradient-to-r from-[#5b8def] via-[#a78bfa] to-[#34d399]"
      >
        built
      </span>
    </h2>
  </div>

  <!-- Project Cards Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

    <div
      *ngFor="let project of projects; let i = index"
      #projectCard
      class="project-card group
             bg-[rgba(14,20,40,0.65)] border border-[rgba(100,140,255,0.08)]
             rounded-2xl overflow-hidden
             opacity-0 translate-y-8
             hover:-translate-y-1.5
             hover:border-[rgba(100,160,255,0.2)]
             hover:shadow-[0_20px_50px_rgba(0,0,0,0.35)]
             transition-all duration-400 ease-[cubic-bezier(0.4,0,0.2,1)]
             cursor-default"
      [style.transitionDelay]="(i * 120) + 'ms'"
    >
      <!-- Banner -->
      <div class="relative h-[160px] overflow-hidden">
        <!-- Gradient Background -->
        <div
          class="absolute inset-0 opacity-60 bg-gradient-to-br"
          [ngClass]="project.gradient"
        ></div>

        <!-- Grid Pattern Overlay -->
        <div
          class="absolute inset-0 opacity-[0.04]"
          style="background-image: radial-gradient(circle, #ffffff 1px, transparent 1px); background-size: 20px 20px;"
        ></div>

        <!-- Icon -->
        <div
          class="absolute inset-0 flex items-center justify-center
                 text-5xl opacity-30
                 group-hover:opacity-50 group-hover:scale-110
                 transition-all duration-500"
        >
          {{ project.icon }}
        </div>

        <!-- Shine effect on hover -->
        <div
          class="absolute inset-0 bg-gradient-to-r from-transparent via-white/[0.03] to-transparent
                 -translate-x-full group-hover:translate-x-full
                 transition-transform duration-700 ease-out"
        ></div>
      </div>

      <!-- Card Body -->
      <div class="p-6 md:p-7">
        <!-- Project Type -->
        <p
          class="font-['JetBrains_Mono',monospace] text-[0.65rem]
                 text-[#a78bfa] tracking-[1.5px] uppercase mb-2"
        >
          {{ project.type }}
        </p>

        <!-- Title -->
        <h3
          class="text-[1.1rem] font-bold text-[#e8ecf4] mb-3
                 group-hover:text-white transition-colors duration-300"
        >
          {{ project.title }}
        </h3>

        <!-- Description -->
        <p class="text-[0.82rem] text-[#515a6e] leading-[1.7] mb-5">
          {{ project.description }}
        </p>

        <!-- Tech Stack Tags -->
        <div class="flex flex-wrap gap-1.5">
          <span
            *ngFor="let tech of project.stack"
            class="font-['JetBrains_Mono',monospace] text-[0.65rem]
                   px-2.5 py-[3px] rounded
                   bg-[rgba(91,141,239,0.06)] border border-[rgba(100,140,255,0.08)]
                   text-[#8a94a8]
                   group-hover:text-[#7ba8ff] group-hover:border-[rgba(91,141,239,0.15)]
                   transition-colors duration-300"
          >
            {{ tech }}
          </span>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- Scroll-triggered animation -->
<style>
  .project-card.is-visible {
    opacity: 1 !important;
    transform: translateY(0) !important;
  }

  .project-card.is-visible:hover {
    transform: translateY(-6px) !important;
  }
</style>
