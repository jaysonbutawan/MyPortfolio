<section id="skills" class="relative py-20 md:py-28 px-6 md:px-8 max-w-300 mx-auto">
  <!-- Section Header -->
  <div class="mb-12">
    <p
      class="font-['JetBrains_Mono',monospace] text-[0.72rem] text-[#5b8def] tracking-[3px] uppercase opacity-80 mb-3"
    >
      // Skills & Expertise
    </p>
    <h2
      class="text-[2.2rem] md:text-[2.6rem] font-bold tracking-[-1px] leading-[1.15] text-[#e8ecf4]"
    >
      My
      <span
        class="italic text-transparent bg-clip-text bg-linear-to-r from-[#5b8def] via-[#a78bfa] to-[#34d399]"
      >
        tech stack
      </span>
    </h2>
  </div>

  <!-- Skills Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
    <div
      *ngFor="let category of categories; let i = index"
      #skillCard
      class="group bg-[rgba(14,20,40,0.65)] border border-[rgba(100,140,255,0.08)] rounded-2xl p-7 hover:bg-[rgba(20,30,60,0.8)] hover:border-[rgba(100,160,255,0.2)] hover:-translate-y-1 hover:shadow-[0_12px_40px_rgba(0,0,0,0.3)] transition-all duration-350 ease-out"
    >
      <!-- Category Header -->
      <div class="flex items-center gap-3 mb-6">
        <div
          class="w-9 h-9 rounded-lg flex items-center justify-center text-[0.9rem]"
          [ngClass]="category.iconBg"
        >
          {{ category.icon }}
        </div>
        <h3 class="text-[1rem] font-semibold text-[#e8ecf4]">
          {{ category.title }}
        </h3>
      </div>

      <!-- Skill Bars -->
      <div class="space-y-5">
        <div *ngFor="let skill of category.skills">
          <!-- Skill Name + Percentage -->
          <div class="flex items-center justify-between mb-2">
            <span class="text-[0.82rem] font-medium text-[#8a94a8]">
              {{ skill.name }}
            </span>
            <span class="font-['JetBrains_Mono',monospace] text-[0.72rem] text-[#5b8def]">
              {{ skill.percent }}%
            </span>
          </div>

          <div class="h-1 bg-[rgba(91,141,239,0.08)] rounded-full overflow-hidden">
            <div
              class="skill-fill h-full rounded-full bg-linear-to-r from-[#5b8def] via-[#a78bfa] to-[#34d399] transition-[width] duration-[1500ms] ease-[cubic-bezier(0.4,0,0.2,1)]"
              [style.width.%]="skill.percent"
            ></div>
          </div>
        </div>
      </div>

      <div class="flex flex-wrap gap-2 mt-6 pt-1">
        @for (tag of category.tags; track tag) {
          <span
            class="font-['JetBrains_Mono',monospace] text-[0.7rem] px-3 py-1 rounded-md bg-[rgba(91,141,239,0.06)] border border-[rgba(91,141,239,0.1)] text-[#8a94a8] hover:bg-[rgba(91,141,239,0.12)] hover:text-[#7ba8ff] hover:border-[rgba(91,141,239,0.25)] hover:-translate-y-[1px] transition-all duration-300 cursor-default"
          >
            {{ tag }}
          </span>
        } @empty {
          <span class="text-[0.6rem] text-slate-600 italic uppercase tracking-widest"
            >No tags listed</span
          >
        }
      </div>
    </div>
  </div>
</section>
