<section id="experience" class="relative py-20 md:py-28 px-6 md:px-8 max-w-300 mx-auto">
  <!-- Section Header -->
  <div class="mb-14">
    <p
      class="font-['JetBrains_Mono',monospace] text-4xl text-[#5b8def] tracking-[3px] uppercase opacity-80 mb-3"
    >
      // Work Experience
    </p>
    <h2
      class="text-[2.2rem] md:text-[2.6rem] font-bold tracking-[-1px] leading-[1.15] text-[#e8ecf4]"
    >
      Where I've
      <span
        class="text-transparent bg-clip-text bg-linear-to-r from-[#5b8def] via-[#a78bfa] to-[#34d399]"
      >
        worked
      </span>
    </h2>
  </div>

  <!-- Timeline Container -->
  <div class="relative pl-8 md:pl-12">
    <!-- Vertical Line -->
    <div
      class="absolute left-1.75 md:left-1.75 top-0 bottom-0 w-0.5 bg-linear-to-b from-[#5b8def] via-[#a78bfa] to-transparent opacity-20"
    ></div>

    <!-- Timeline Items -->
    @for (exp of experiences; track exp.role; let i = $index) {
      <div
        #timelineItem
        class="timeline-item relative mb-10 last:mb-0 opacity-0 translate-y-8 transition-all duration-700 ease-in-out"
        [style.transitionDelay]="i * 150 + 'ms'"
      >
        <div
          class="absolute -left-8 md:-left-12 top-2 w-3.5 h-3.5rounded-full bg-[#06080f] border-2 border-[#5b8def] shadow-[0_0_12px_rgba(91,141,239,0.3)] z-10"
        ></div>

        <div
          class="group bg-[rgba(14,20,40,0.65)] border border-[rgba(100,140,255,0.08)] rounded-2xl p-6 md:p-7 hover:bg-[rgba(20,30,60,0.8)] hover:border-[rgba(100,160,255,0.2)] hover:translate-x-1.5 transition-all duration-350 cursor-default"
        >
          <p
            class="font-['JetBrains_Mono',monospace] text-[0.72rem] text-[#5b8def] tracking-[0.5px] mb-2"
          >
            {{ exp.date }}
          </p>

          <h3 class="text-[1.15rem] font-bold text-[#e8ecf4] mb-1">
            {{ exp.role }}
          </h3>

          <p class="text-[0.88rem] text-[#8a94a8] mb-4">
            {{ exp.company }}
          </p>

          <p class="text-[0.85rem] text-[#515a6e] leading-[1.7] mb-4">
            {{ exp.description }}
          </p>

          <div class="flex flex-wrap gap-1.5">
            @for (tech of exp.tech; track tech) {
              <span
                class="font-['JetBrains_Mono',monospace] text-[0.65rem] px-2.5 py-0.75 rounded bg-[rgba(52,211,153,0.06)] border border-[rgba(52,211,153,0.12)] text-[#34d399] group-hover:bg-[rgba(52,211,153,0.1)] group-hover:border-[rgba(52,211,153,0.2)] transition-colors duration-300"
              >
                {{ tech }}
              </span>
            } @empty {
              <span class="text-[0.6rem] text-slate-600 uppercase tracking-tighter"
                >Core Development</span
              >
            }
          </div>
        </div>
      </div>
    }
  </div>
</section>

<!-- Scroll-triggered animation: .is-visible is added by IntersectionObserver -->
<style>
  .timeline-item.is-visible {
    opacity: 1 !important;
    transform: translateY(0) !important;
  }
</style>
