<!-- Tech Stack Bar — flows naturally at the bottom of hero content -->
<div class="w-full px-6 md:px-12 lg:px-20 xl:px-28 z-10 mt-10 md:mt-14 pb-8">
  <div class="pt-6 overflow-hidden">
    <!-- Loading skeleton — responsive count -->
    @if (isLoading()) {
      <div class="flex gap-3 sm:gap-4 overflow-hidden">
        @for (i of [1, 2, 3, 4, 5, 6, 7, 8]; track i) {
          <div
            class="w-11 h-11 sm:w-14 sm:h-14 rounded-lg sm:rounded-xl bg-[rgba(91,141,239,0.04)] animate-pulse flex-shrink-0"
          ></div>
        }
      </div>
    }

    <!-- Marquee container -->
    @if (!isLoading() && techIcons().length > 0) {
      <div
        class="marquee-container relative"
        (mouseenter)="onMarqueeEnter()"
        (mouseleave)="onMarqueeLeave()"
        (touchstart)="onMarqueeEnter()"
        (touchend)="onMarqueeLeave()"
      >
        <!-- Fade edges — narrower on mobile -->
        <div
          class="absolute left-0 top-0 bottom-0 w-8 sm:w-16 z-10 pointer-events-none bg-linear-to-r from-[#06080f] to-transparent"
        ></div>
        <div
          class="absolute right-0 top-0 bottom-0 w-8 sm:w-16 z-10 pointer-events-none bg-linear-to-l from-[#06080f] to-transparent"
        ></div>

        <!-- Scrolling track -->
        <div class="marquee-track flex gap-3 sm:gap-4" [class.paused]="isPaused()">
          <!-- First set -->
          @for (icon of techIcons(); track icon.name) {
            <div
              class="group/icon shrink-0 relative w-11 h-11 sm:w-14 sm:h-14 md:w-16 md:h-16 rounded-lg sm:rounded-xl bg-[rgba(14,20,40,0.6)] border border-[rgba(100,140,255,0.06)] flex items-center justify-center hover:bg-[rgba(20,30,60,0.8)] hover:border-[rgba(100,160,255,0.2)] hover:shadow-[0_0_20px_rgba(91,141,239,0.1)] hover:scale-110 transition-all duration-300 cursor-default"
            >
              <i
                [class]="icon.iconClass"
                class="text-lg sm:text-xl md:text-2xl transition-all duration-300"
                [style.color]="icon.color"
                [style.filter]="'brightness(0.7)'"
              ></i>

              <!-- Tooltip — hidden on touch devices -->
              <div
                class="absolute -top-10 left-1/2 -translate-x-1/2 px-2.5 py-1 rounded-lg bg-[#0c1120] border border-[rgba(100,140,255,0.1)] text-[0.6rem] font-['JetBrains_Mono',monospace] text-[#8a94a8] whitespace-nowrap opacity-0 -translate-y-1 pointer-events-none group-hover/icon:opacity-100 group-hover/icon:translate-y-0 transition-all duration-200 z-20 hidden sm:block"
              >
                {{ icon.name }}
              </div>
            </div>
          }

          <!-- Duplicate set for seamless loop -->
          @for (icon of techIcons(); track icon.name + '-dup') {
            <div
              class="group/icon flex-shrink-0 relative w-11 h-11 sm:w-14 sm:h-14 md:w-16 md:h-16 rounded-lg sm:rounded-xl bg-[rgba(14,20,40,0.6)] border border-[rgba(100,140,255,0.06)] flex items-center justify-center hover:bg-[rgba(20,30,60,0.8)] hover:border-[rgba(100,160,255,0.2)] hover:shadow-[0_0_20px_rgba(91,141,239,0.1)] hover:scale-110 transition-all duration-300 cursor-default"
            >
              <i
                [class]="icon.iconClass"
                class="text-lg sm:text-xl md:text-2xl transition-all duration-300"
                [style.color]="icon.color"
                [style.filter]="'brightness(0.7)'"
              ></i>

              <div
                class="absolute -top-10 left-1/2 -translate-x-1/2 px-2.5 py-1 rounded-lg bg-[#0c1120] border border-[rgba(100,140,255,0.1)] text-[0.6rem] font-['JetBrains_Mono',monospace] text-[#8a94a8] whitespace-nowrap opacity-0 -translate-y-1 pointer-events-none group-hover/icon:opacity-100 group-hover/icon:translate-y-0 transition-all duration-200 z-20 hidden sm:block"
              >
                {{ icon.name }}
              </div>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
