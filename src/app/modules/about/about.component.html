<section id="about" class="relative py-20 md:py-28 lg:py-36 px-6 md:px-12 lg:px-20 xl:px-28 w-full">
  <!-- ====== Section Header ====== -->
  <div #sectionHeader class="about-reveal mb-12 md:mb-16">
    <p
      class="font-['JetBrains_Mono',monospace] text-5xl text-[#5b8def] tracking-[3px] uppercase opacity-80 mb-4"
    >
      //&#32;<app-inline-edit
        [value]="about().section_label"
        [isAdmin]="auth.isAdmin()"
        (saved)="updateField('section_label', $event)"
      />
    </p>
    <h2
      class="text-3xl sm:text-4xl md:text-[2.8rem] font-bold tracking-[-1.5px] leading-[1.1] text-[#e8ecf4]"
    >
      <app-inline-edit
        [value]="about().heading_main"
        [isAdmin]="auth.isAdmin()"
        (saved)="updateField('heading_main', $event)"
      />
      <span
        class="italic text-transparent bg-clip-text bg-linear-to-r from-[#5b8def] via-[#a78bfa] to-[#34d399]"
      >
        <app-inline-edit
          [value]="about().heading_highlight"
          [isAdmin]="auth.isAdmin()"
          displayClass="italic text-transparent bg-clip-text bg-linear-to-r from-[#5b8def] via-[#a78bfa] to-[#34d399]"
          (saved)="updateField('heading_highlight', $event)"
        />
      </span>
    </h2>
    <!-- Decorative line under heading -->
    <div class="mt-6 flex items-center gap-3">
      <div class="h-0.5 w-12 bg-linear-to-r from-[#5b8def] to-[#a78bfa] rounded-full"></div>
      <div class="h-0.5 w-4 bg-[#34d399] rounded-full"></div>
    </div>
  </div>

  <!-- ====== Two Column Grid ====== -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20">
    <!-- Left: About Text -->
    <div #aboutText class="about-reveal about-reveal--text space-y-6">
      <p class="text-[#8a94a8] text-[0.95rem] sm:text-base leading-[1.9] tracking-[0.2px]">
        <app-inline-edit
          [value]="about().description_top"
          type="textarea"
          [isAdmin]="auth.isAdmin()"
          (saved)="updateField('description_top', $event)"
        />
      </p>
      <p class="text-[#8a94a8] text-[0.95rem] sm:text-base leading-[1.9] tracking-[0.2px]">
        <app-inline-edit
          [value]="about().description_bottom"
          type="textarea"
          [isAdmin]="auth.isAdmin()"
          (saved)="updateField('description_bottom', $event)"
        />
      </p>
    </div>

    <!-- Right: Detail Cards -->
    <div class="flex flex-col gap-4 sm:gap-5">
      @for (detail of details(); track detail.id; let i = $index) {
        <div
          #detailCard
          class="about-reveal group relative flex items-center gap-5 sm:gap-6 px-6 sm:px-8 py-5 sm:py-7 bg-[rgba(14,20,40,0.5)] border border-[rgba(100,140,255,0.08)] rounded-2xl sm:rounded-3xl overflow-hidden hover:bg-[rgba(20,30,60,0.7)] hover:border-[rgba(100,160,255,0.2)] hover:translate-x-2 hover:shadow-[0_8px_40px_rgba(0,0,0,0.25)] transition-all duration-500 ease-out cursor-default"
          [style.transitionDelay]="i * 100 + 250 + 'ms'"
        >
          <!-- Background glow on hover -->
          <div
            class="absolute -right-10 -top-10 w-32 h-32 rounded-full bg-[rgba(91,141,239,0.04)] blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none"
          ></div>

          <!-- Icon Container — larger and more prominent -->
          <div
            class="relative w-14 h-14 sm:w-16 sm:h-16 rounded-2xl shrink-0 flex items-center justify-center text-xl sm:text-2xl bg-linear-to-br border border-white/4 group-hover:scale-110 group-hover:rotate-3 transition-all duration-500 ease-out"
            [ngClass]="detail.gradient"
          >
            {{ detail.icon }}

            <!-- Subtle ring on hover -->
            <div
              class="absolute inset-0 rounded-2xl border border-white/0 group-hover:border-white/8 group-hover:shadow-[0_0_20px_rgba(91,141,239,0.15)] transition-all duration-500"
            ></div>
          </div>

          <!-- Text — larger and better spaced -->
          <div class="min-w-0 flex-1">
            <p
              class="text-[0.68rem] sm:text-[0.72rem] font-bold text-[#515a6e] uppercase tracking-[2px] leading-none mb-2 group-hover:text-[#8a94a8] transition-colors duration-300"
            >
              <app-inline-edit
                [value]="detail.label"
                [isAdmin]="auth.isAdmin()"
                (saved)="updateCard(detail.id, 'label', $event)"
              />
            </p>
            <p
              class="text-[0.95rem] sm:text-[1.05rem] font-semibold text-[#e8ecf4] truncate leading-snug group-hover:text-white transition-colors duration-300"
            >
              <app-inline-edit
                [value]="detail.value"
                [isAdmin]="auth.isAdmin()"
                (saved)="updateCard(detail.id, 'value', $event)"
              />
            </p>
          </div>

          <!-- Hover arrow indicator -->
          <div
            class="shrink-0 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-400"
          >
            <i class="pi pi-arrow-right text-sm text-[#5b8def]"></i>
          </div>
        </div>
      }
    </div>
  </div>
</section>
