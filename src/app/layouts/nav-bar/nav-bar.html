<nav [class]="navClasses()">
  <div class="max-w-350mx-auto px-6 md:px-10 h-20 flex items-center justify-between">
    <!-- ====== LOGO (far left) ====== -->
    <a
      (click)="scrollTo('hero')"
      role="button"
      tabindex="0"
      (keydown.enter)="scrollTo('hero')"
      class="flex items-center gap-1.5 cursor-pointer select-none group mr-auto"
    >
      <span
        class="font-extrabold text-2xl tracking-[-0.5px] bg-linear-to-r from-[#5b8def] via-[#a78bfa] to-[#34d399] bg-clip-text text-transparent"
      >
        JD
      </span>
      <span
        class="font-mono font-medium text-base text-[#515a6e] group-hover:text-[#8a94a8] transition-colors duration-300"
      >
        .dev
      </span>
    </a>

    <!-- ====== DESKTOP NAV LINKS (centered) ====== -->
    <ul class="hidden lg:flex items-center gap-1.5 mx-auto">
      @for (link of navLinks; track link.fragment) {
        <li>
          <button
            (click)="scrollTo(link.fragment)"
            type="button"
            class="relative px-5 py-2.5 rounded-xl text-[0.95rem] font-medium tracking-[0.2px] transition-all duration-300 cursor-pointer"
            [ngClass]="{
              'text-[#e8ecf4] bg-[rgba(91,141,239,0.1)]': isActive(link.fragment),
              'text-[#8a94a8] hover:text-[#e8ecf4] hover:bg-[rgba(91,141,239,0.06)]': !isActive(
                link.fragment
              ),
            }"
          >
            {{ link.label }}

            <!-- Active indicator -->
            @if (isActive(link.fragment)) {
              <span
                class="absolute bottom-1 left-1/2 -translate-x-1/2 w-5 h-[2.5px] rounded-full bg-[#5b8def] shadow-[0_0_8px_rgba(91,141,239,0.4)] transition-all duration-300"
              ></span>
            }
          </button>
        </li>
      }
    </ul>

    <!-- ====== CTA BUTTON (far right) ====== -->
    <a
      (click)="scrollTo('contact')"
      role="button"
      tabindex="0"
      (keydown.enter)="scrollTo('contact')"
      class="hidden lg:inline-flex items-center gap-2.5 ml-auto px-7 py-3 rounded-xl text-[0.92rem] font-semibold tracking-[0.2px] cursor-pointer bg-linear-to-r from-[#5b8def] via-[#a78bfa] to-[#34d399] text-white shadow-[0_4px_24px_rgba(91,141,239,0.3)] hover:shadow-[0_8px_32px_rgba(91,141,239,0.45)] hover:-translate-y-[2px] active:scale-[0.97] transition-all duration-300"
    >
      <i class="pi pi-send text-sm"></i>
      Let's Talk
    </a>

    <!-- ====== HAMBURGER (Mobile) ====== -->
    <button
      (click)="toggleMobileMenu()"
      type="button"
      aria-label="Toggle navigation menu"
      [attr.aria-expanded]="isMobileMenuOpen()"
      class="lg:hidden flex flex-col justify-center items-center gap-1.5 p-3 -mr-2 rounded-xl hover:bg-[rgba(91,141,239,0.06)] z-110 cursor-pointer transition-colors duration-200"
    >
      <span
        class="w-6 h-0.5 rounded-full bg-[#e8ecf4] transition-all duration-300 origin-center"
        [ngClass]="{
          'rotate-45 translate-y-2': isMobileMenuOpen(),
          'rotate-0 translate-y-0': !isMobileMenuOpen(),
        }"
      ></span>
      <span
        class="w-6 h-0.5 rounded-full bg-[#e8ecf4] transition-all duration-300"
        [ngClass]="{
          'opacity-0 scale-x-0': isMobileMenuOpen(),
          'opacity-100 scale-x-100': !isMobileMenuOpen(),
        }"
      ></span>
      <span
        class="w-6 h-0.5 rounded-full bg-[#e8ecf4] transition-all duration-300 origin-center"
        [ngClass]="{
          '-rotate-45 -translate-y-2': isMobileMenuOpen(),
          'rotate-0 translate-y-0': !isMobileMenuOpen(),
        }"
      ></span>
    </button>
  </div>

  <!-- ====== MOBILE MENU ====== -->

  <!-- Backdrop -->
  @if (isMobileMenuOpen()) {
    <div
      (click)="closeMobileMenu()"
      class="fixed inset-0 bg-[#06080f]/60 backdrop-blur-sm z-99 lg:hidden"
      style="animation: fadeIn 0.2s ease-out"
    ></div>
  }

  <!-- Slide-in Panel -->
  <div
    class="fixed top-0 right-0 w-85 max-w-[85vw] h-screen z-100 lg:hidden bg-[#06080f]/97 backdrop-blur-xlborder-l border-[rgba(100,140,255,0.08)] transition-transform duration-300 ease-out flex flex-col"
    [ngClass]="{
      'translate-x-0': isMobileMenuOpen(),
      'translate-x-full': !isMobileMenuOpen(),
    }"
  >
    <!-- Panel Header -->
    <div class="px-7 pt-7 pb-5 border-b border-[rgba(100,140,255,0.08)] shrink-0">
      <div class="flex items-center justify-between">
        <span
          class="font-extrabold text-2xl bg-linear-to-r from-[#5b8def] via-[#a78bfa] to-[#34d399] bg-clip-text text-transparent"
        >
          JD<span class="font-mono font-medium text-base text-[#515a6e]">.dev</span>
        </span>
        <button
          (click)="closeMobileMenu()"
          type="button"
          aria-label="Close menu"
          class="w-10 h-10 rounded-xl flex items-center justify-center text-[#515a6e] hover:text-white hover:bg-[rgba(91,141,239,0.08)] transition-all duration-200 cursor-pointer"
        >
          <i class="pi pi-times text-lg"></i>
        </button>
      </div>
    </div>

    <!-- Panel Links -->
    <div class="flex-1 overflow-y-auto px-5 pt-5 pb-4 space-y-1.5">
      @for (link of navLinks; track link.fragment; let i = $index) {
        <button
          (click)="scrollTo(link.fragment)"
          type="button"
          class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-[1.05rem] font-medium transition-all duration-300 cursor-pointer"
          [ngClass]="{
            'text-[#e8ecf4] bg-[rgba(91,141,239,0.1)] border border-[rgba(91,141,239,0.12)]':
              isActive(link.fragment),
            'text-[#8a94a8] hover:text-[#e8ecf4] hover:bg-[rgba(91,141,239,0.06)] border border-transparent':
              !isActive(link.fragment),
          }"
        >
          <!-- Label -->
          <span>{{ link.label }}</span>

          <!-- Active chevron -->
          @if (isActive(link.fragment)) {
            <i class="pi pi-chevron-right text-xs text-[#5b8def] ml-auto"></i>
          }
        </button>
      }
    </div>

    <!-- Panel Footer -->
    <div class="hrink-0 p-7 border-t border-[rgba(100,140,255,0.08)]">
      <!-- CTA -->
      <button
        (click)="scrollTo('contact')"
        type="button"
        class="w-full flex items-center justify-center gap-2.5 px-5 py-4 rounded-2xl text-[0.95rem] font-bold tracking-[0.15em] uppercase cursor-pointer bg-linear-to-r from-[#5b8def] via-[#a78bfa] to-[#34d399] text-white shadow-[0_4px_24px_rgba(91,141,239,0.3)] hover:shadow-[0_8px_32px_rgba(91,141,239,0.45)] active:scale-[0.97] transition-all duration-300"
      >
        <i class="pi pi-send text-sm"></i>
        Let's Talk
      </button>

      <!-- Social Links -->
      <div class="flex items-center justify-center gap-3 mt-5">
        @for (social of socialLinks; track social.label) {
          <a
            [href]="social.href"
            target="_blank"
            rel="noopener noreferrer"
            [attr.aria-label]="social.label"
            class="w-11 h-11 rounded-xl bg-[rgba(91,141,239,0.06)] border border-[rgba(100,140,255,0.08)] flex items-center justify-center text-[#515a6e] hover:text-[#5b8def] hover:bg-[rgba(91,141,239,0.1)] hover:border-[rgba(91,141,239,0.2)] active:scale-95 transition-all duration-300"
          >
            <i [class]="social.icon" class="text-base"></i>
          </a>
        }
      </div>
    </div>
  </div>
</nav>
